<script id="theory-en" type="application/json">
[{"title":"Proposition 1 (P1) – Multidimensional Reconfiguration of Perceived Value","intro":"The integration of AI into consulting missions reconfigures client perceived value along three interdependent dimensions:","dims":[{"icon":"🤝","label":"Relational Value","text":"consultant legitimacy, actively produced through valuation activities — activities whose visibility and credibility are disrupted when AI mediates the interaction. Empirical evidence from adjacent consumer contexts suggests that AI use affects perceived credibility as a function of disclosure modality (Bourgoin, 2014 ; Raisch & Krakowski, 2020 ; Khan & Mishra, 2024)"},{"icon":"⚙️","label":"Processual Value","text":"the experience of joint problem-solving and iterative dialogue between consultant and client — its rhythm, emotional texture and role distribution — reshaped when AI enters as a third actor with delegable agency (Grönroos & Voima, 2013 ; Baird & Maruping, 2021)"},{"icon":"💡","label":"Cognitive Value","text":"new managerial knowledge and capabilities co-created through the consulting relationship, whose diversity and novelty are amplified by AI generativity — but whose authorship becomes contested (Turner, 1982 ; Ciampi, 2017 ; Harfouche et al., 2023)"}],"note":"These three dimensions follow a primary sequence — <strong>Relational → Processual → Cognitive</strong> — with one grounded feedback loop (Processual → Relational), valid with or without AI.<br><br><span id='td1'></span>① <strong>R→P becomes fragile:</strong> in S2 (masked AI use), relational legitimacy rests on a foundation invisible to the client. If discovered, processual engagement is retrospectively delegitimised. Transparency (P2) is the protective mechanism.<br><br><span id='td2'></span>② <strong>P→C becomes decoupled:</strong> AI can deliver cognitive outputs without genuine processual engagement — the client receives knowledge without having co-produced it. Structurally new and specific to AI integration.<br><br><span id='td3'></span>③ <strong>P→R feedback risks inversion:</strong> spectacular AI outputs may be attributed to AI rather than to the consultant's orchestration. Client AI literacy, algorithm aversion, and contribution readability (P3) are the moderating conditions.<br><br><strong>Boundary condition:</strong> when P2 and P3 fail simultaneously, all three relationships collapse, triggering value co-destruction (Plé & Cáceres, 2010 ; Lumivalo et al., 2024).","anchor":"SDL (Vargo & Lusch, 2004, 2016) · Value co-creation (Grönroos & Voima, 2013) · Cognitive nature of consulting (Turner, 1982 ; Ciampi, 2017) · Knowledge augmentation (Harfouche et al., 2023) · Legitimacy production (Bourgoin, 2014) · Relational value chain (Rivière & Mencarelli, 2012) · Blurring of contributions (Raisch & Krakowski, 2020) · AI and perceived credibility (Khan & Mishra, 2024) · AI as agentic actor (Baird & Maruping, 2021) · Co-destruction as boundary condition (Plé & Cáceres, 2010 ; Lumivalo et al., 2024)"},{"title":"Proposition 2 (P2) – Epistemic Mediation and Substantive Transparency","intro":"Transparency regarding AI use constitutes the central mediating mechanism between AI integration and perceived value. It operates at two distinct levels:","dims":[{"icon":"📢","label":"Performative Transparency","text":"disclosure of AI use, fostering limited procedural trust — necessary but insufficient"},{"icon":"🔍","label":"Substantive Transparency (epistemic mediation)","text":"the consultant's explicitation of the generation process, limitations and contextualisation of AI outputs — condition for strong cognitive appropriation and legible attribution (P3). Convergent empirical evidence suggests disclosure modality significantly conditions perceived credibility (Khan & Mishra, 2024)."}],"note":"The effect of transparency on perceived value is not linear: performative transparency alone may reduce perceived value if not accompanied by substantive mediation.","anchor":"Limits of algorithmic transparency (Ananny & Crawford, 2018) · Organisational transparency (Albu & Flyverbom, 2019) · Theory of epistemic agency (Origgi, 2022) · AI disclosure and perceived credibility (Khan & Mishra, 2024)"},{"title":"Proposition 3 (P3) – Moderating Conditions on Attribution","intro":"The protective effect of transparency (P2) is not unconditional. Three categories of contingency determine whether transparency produces correct attribution:","dims":[{"icon":"🏛️","label":"Relational contingencies (pre-AI consulting literature)","text":"prior trust capital and relational history condition how transparency disclosures are received (Bourgoin, 2014 ; Rivière & Mencarelli, 2012)."},{"icon":"📍","label":"Situational contingencies (pre-AI consulting literature)","text":"mission phase and political stakes condition whether transparency is deployed and received appropriately. Algorithm aversion — distrust of algorithmic outputs even when objectively superior (Dietvorst et al., 2015) — also operates at this level: situationally triggered and independent of AI literacy."},{"icon":"🎓","label":"Actor-level contingency — Client AI literacy (this thesis)","text":"the client's prior conceptual mastery of AI directly conditions whether transparent disclosures can be interpreted correctly. AI literacy (competence) and algorithm aversion (attitude) are theoretically independent — both condition attribution through distinct mechanisms (Long & Magerko, 2020 ; Dietvorst et al., 2015)."}],"noteRed":true,"note":"<strong>Justified selection of focal contingency:</strong> (1) Theoretical originality — client AI literacy as a contingency on transparency effectiveness is novel and absent from existing frameworks. (2) Methodological tractability — observable within a single exploratory qualitative case, unlike relational or situational contingencies.<br><br>⚠️ When AI literacy is low and algorithm aversion high, P2's mechanism fails even when correctly deployed. When AI literacy is low and readability weak, automation bias dominates. Both are entry points into value co-destruction (Plé & Cáceres, 2010 ; Lumivalo et al., 2024).","anchor":"Contingency theory (Lawrence & Lorsch, 1967 ; Donaldson, 2001) · Blurring of contributions (Raisch & Krakowski, 2020) · Value attribution in consulting (Bourgoin, 2014) · Relational trust chain (Rivière & Mencarelli, 2012) · AI literacy (Long & Magerko, 2020) · Algorithm aversion (Dietvorst et al., 2015) · Automation bias (Skitka et al., 1999)"},{"title":"Managerial Implication — Dynamic S1/S2/S3 Orchestration","intro":"P1, P2 and P3 converge toward a central managerial implication: perceived value results from the consultant's temporal orchestration of co-creation regimes, depending on:","dims":[{"icon":"📅","label":"Mission Phases","text":"discovery (S1 for relational anchoring), analysis (S2/S3 for cognitive value), strategic validation (return to S1 for decisional authority)"},{"icon":"🎯","label":"Client Expectations","text":"appetite for co-construction, desired control level, organisational culture and AI literacy"},{"icon":"⚖️","label":"Transparency and Attribution Stakes","text":"each regime transition reinforces (P2) or erodes (P3) perceived value — orchestration is an act of epistemic mediation as much as a managerial one"}],"note":"Regime transitions generate asymmetric cognitive and relational costs (S1→S3 > S3→S1). Poorly managed orchestration activates co-destruction conditions (Plé & Cáceres, 2010).","anchor":"Co-creation sphere (Grönroos & Voima, 2013) · Delegation to agentic AI (Baird & Maruping, 2021) · Co-destruction as boundary condition (Plé & Cáceres, 2010 ; Lumivalo et al., 2024)"}]
</script>

<script id="theory-fr" type="application/json">
[{"title":"Proposition 1 (P1) – Reconfiguration multidimensionnelle de la valeur perçue","intro":"L'intégration de l'IA dans les missions de conseil reconfigure la valeur perçue par le client selon trois dimensions interdépendantes :","dims":[{"icon":"🤝","label":"Valeur relationnelle","text":"légitimité du consultant, activement produite par des activités de valorisation — activités dont la visibilité et la crédibilité sont perturbées lorsque l'IA médie l'interaction. Des données empiriques issues de contextes grand public suggèrent que l'usage de l'IA affecte la crédibilité perçue en fonction de la modalité de divulgation (Bourgoin, 2014 ; Raisch & Krakowski, 2020 ; Khan & Mishra, 2024)"},{"icon":"⚙️","label":"Valeur processuelle","text":"l'expérience de résolution conjointe de problèmes et de dialogue itératif entre consultant et client — son rythme, sa texture émotionnelle et la distribution des rôles — reconfigurée lorsque l'IA entre comme troisième acteur doté d'une agence déléguable (Grönroos & Voima, 2013 ; Baird & Maruping, 2021)"},{"icon":"💡","label":"Valeur cognitive","text":"nouvelles connaissances managériales et capacités co-créées dans la relation de conseil, dont la diversité et la nouveauté sont amplifiées par la générativité de l'IA — mais dont la paternité devient contestée (Turner, 1982 ; Ciampi, 2017 ; Harfouche et al., 2023)"}],"note":"Ces trois dimensions suivent une séquence primaire — <strong>Relationnelle → Processuelle → Cognitive</strong> — avec une boucle de rétroaction fondée (Processuelle → Relationnelle), valide avec ou sans IA.<br><br><span id='td1'></span>① <strong>R→P fragilisée :</strong> en S2 (usage IA masqué), la légitimité repose sur une fondation invisible pour le client. Si découverte, l'engagement processuel est rétrospectivement délégitimé. La transparence (P2) est le mécanisme protecteur.<br><br><span id='td2'></span>② <strong>P→C découplée :</strong> l'IA peut livrer des outputs cognitifs sans engagement processuel réel. C'est structurellement nouveau et spécifique à l'intégration de l'IA.<br><br><span id='td3'></span>③ <strong>Rétroaction P→R risque d'inversion :</strong> des outputs IA remarquables peuvent être attribués à l'IA plutôt qu'au consultant. L'AI literacy du client, l'aversion à l'algorithme et la lisibilité des contributions (P3) sont les conditions modératrices.<br><br><strong>Condition limite :</strong> lorsque P2 et P3 échouent simultanément, les trois relations s'effondrent, déclenchant la co-destruction de valeur (Plé & Cáceres, 2010 ; Lumivalo et al., 2024).","anchor":"SDL (Vargo & Lusch, 2004, 2016) · Co-création de valeur (Grönroos & Voima, 2013) · Nature cognitive du conseil (Turner, 1982 ; Ciampi, 2017) · Augmentation de la connaissance (Harfouche et al., 2023) · Production de légitimité (Bourgoin, 2014) · Chaîne relationnelle (Rivière & Mencarelli, 2012) · Floutage des contributions (Raisch & Krakowski, 2020) · Usage IA et crédibilité perçue (Khan & Mishra, 2024) · IA comme acteur agentique (Baird & Maruping, 2021) · Co-destruction comme condition limite (Plé & Cáceres, 2010 ; Lumivalo et al., 2024)"},{"title":"Proposition 2 (P2) – Médiation épistémique et transparence substantielle","intro":"La transparence sur l'usage de l'IA constitue le mécanisme médiateur central entre intégration de l'IA et valeur perçue. Elle opère à deux niveaux distincts :","dims":[{"icon":"📢","label":"Transparence performative","text":"divulgation de l'usage de l'IA, favorisant une confiance procédurale limitée — nécessaire mais insuffisante"},{"icon":"🔍","label":"Transparence substantielle (médiation épistémique)","text":"explicitation par le consultant du processus de génération, des limites et de la contextualisation des outputs IA — condition d'une appropriation cognitive forte et d'une attribution lisible (P3). Des données empiriques convergentes suggèrent que la modalité de divulgation conditionne la crédibilité perçue des outputs IA (Khan & Mishra, 2024)."}],"note":"L'effet de la transparence sur la valeur perçue n'est pas linéaire : la transparence performative seule peut réduire la valeur perçue si elle n'est pas accompagnée d'une médiation substantielle.","anchor":"Limites de la transparence algorithmique (Ananny & Crawford, 2018) · Transparence organisationnelle (Albu & Flyverbom, 2019) · Théorie de l'agence épistémique (Origgi, 2022) · Usage IA et crédibilité perçue (Khan & Mishra, 2024)"},{"title":"Proposition 3 (P3) – Conditions modératrices de l'attribution","intro":"L'effet protecteur de la transparence (P2) n'est pas inconditionnel. Trois catégories de contingence déterminent si la transparence produit effectivement une attribution correcte :","dims":[{"icon":"🏛️","label":"Contingences relationnelles (littérature pré-IA)","text":"le capital de confiance préalable et l'historique relationnel conditionnent la réception des divulgations de transparence (Bourgoin, 2014 ; Rivière & Mencarelli, 2012)."},{"icon":"📍","label":"Contingences situationnelles (littérature pré-IA)","text":"la phase de mission et les enjeux politiques conditionnent si la transparence est déployée et reçue de manière appropriée. L'aversion à l'algorithme — méfiance envers les outputs algorithmiques même objectivement supérieurs (Dietvorst et al., 2015) — opère également à ce niveau : déclenchée situationnellement et indépendante de l'AI literacy."},{"icon":"🎓","label":"Contingence actorielle — AI literacy du client (cette thèse)","text":"la maîtrise conceptuelle préalable de l'IA par le client conditionne directement si les divulgations transparentes peuvent être correctement interprétées. L'AI literacy (compétence) et l'aversion à l'algorithme (attitude) sont théoriquement indépendantes — les deux conditionnent l'attribution par des mécanismes distincts (Long & Magerko, 2020 ; Dietvorst et al., 2015)."}],"noteRed":true,"note":"<strong>Sélection justifiée de la contingence focale :</strong> (1) Originalité théorique — l'AI literacy du client comme contingence de l'efficacité de la transparence est nouvelle et absente des cadres existants. (2) Tractabilité méthodologique — observable dans un seul cas qualitatif exploratoire.<br><br>⚠️ Lorsque l'AI literacy est faible et l'aversion à l'algorithme élevée, le mécanisme de P2 échoue même correctement déployé. Lorsque l'AI literacy est faible et la lisibilité insuffisante, le biais d'automatisation domine. Les deux constituent des voies d'entrée dans la co-destruction de valeur (Plé & Cáceres, 2010 ; Lumivalo et al., 2024).","anchor":"Théorie de la contingence (Lawrence & Lorsch, 1967 ; Donaldson, 2001) · Floutage des contributions (Raisch & Krakowski, 2020) · Attribution de valeur dans le conseil (Bourgoin, 2014) · Chaîne relationnelle de confiance (Rivière & Mencarelli, 2012) · AI literacy (Long & Magerko, 2020) · Aversion à l'algorithme (Dietvorst et al., 2015) · Biais d'automatisation (Skitka et al., 1999)"},{"title":"Implication managériale — Orchestration dynamique S1/S2/S3","intro":"P1, P2 et P3 convergent vers une implication managériale centrale : la valeur perçue résulte de l'orchestration temporelle des régimes de co-création, en fonction :","dims":[{"icon":"📅","label":"Des phases de la mission","text":"découverte (S1 pour l'ancrage relationnel), analyse (S2/S3 pour la valeur cognitive), validation stratégique (retour S1 pour l'autorité décisionnelle)"},{"icon":"🎯","label":"Des attentes du client","text":"appétence pour la co-construction, niveau de contrôle souhaité, culture organisationnelle et AI literacy"},{"icon":"⚖️","label":"Des enjeux de transparence et d'attribution","text":"chaque transition de régime renforce (P2) ou érode (P3) la valeur perçue — l'orchestration est un acte de médiation épistémique autant que managérial"}],"note":"Les transitions entre régimes génèrent des coûts cognitifs et relationnels asymétriques (S1→S3 > S3→S1). Une orchestration mal gérée active les conditions de co-destruction (Plé & Cáceres, 2010).","anchor":"Sphère de co-création (Grönroos & Voima, 2013) · Délégation à l'IA agentique (Baird & Maruping, 2021) · Co-destruction comme condition limite (Plé & Cáceres, 2010 ; Lumivalo et al., 2024)"}]
</script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--bgm:#161b22;--bgl:#21262d;--tp:#e6edf3;--ts:#8b949e;--bd:#30363d;--s1:#f59e0b;--s2:#8b5cf6;--s3:#10b981;--p1:#ec4899;--p2:#06b6d4;--p3:#8b5cf6}
body{font-family:'Public Sans',sans-serif;background:var(--bg);color:var(--tp);font-size:15px;line-height:1.6}

/* HEADER */
.hdr{background:var(--bgm);border-bottom:1px solid var(--bd);padding:1rem;padding-right:4rem;position:relative}
.hdr h1{font-family:'IBM Plex Mono',monospace;font-size:.95rem;background:linear-gradient(90deg,var(--s1),var(--s2),var(--s3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.3rem}
.hdr h2{font-family:'IBM Plex Mono',monospace;font-size:.85rem;margin-bottom:.5rem}
.lang-btn{position:absolute;top:.8rem;right:.8rem;background:var(--bgl);border:2px solid var(--bd);border-radius:6px;padding:.3rem .6rem;cursor:pointer;font-size:1rem;z-index:10}
.intro{font-size:.8rem;color:var(--ts);margin-bottom:.7rem;line-height:1.5}
.case-box{background:var(--bgl);border-left:3px solid var(--s3);padding:.6rem .8rem;border-radius:0 6px 6px 0;margin-bottom:.7rem;font-size:.78rem}
.case-grid{display:grid;grid-template-columns:1fr 1fr;gap:.3rem .8rem;margin-top:.3rem}
.case-item strong{font-size:.72rem;display:block}
.btn-row{display:flex;gap:.5rem;flex-wrap:wrap}
.btn{background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;border:none;padding:.5rem .9rem;border-radius:6px;cursor:pointer;font-weight:700;font-family:'IBM Plex Mono',monospace;font-size:.75rem}
.btn.active-btn{outline:3px solid white;outline-offset:2px}

/* INLINE PANEL — appears in flow below header */
.inline-panel{display:none;border-top:3px solid var(--p1);background:var(--bgm)}
.inline-panel.open{display:block}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:.8rem 1rem;border-bottom:1px solid var(--bd);background:var(--bgm);position:sticky;top:0;z-index:50}
.panel-hdr h3{font-family:'IBM Plex Mono',monospace;font-size:.9rem;margin:0}
.panel-close{background:var(--bgl);border:2px solid var(--bd);color:var(--tp);width:34px;height:34px;border-radius:6px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.panel-body{padding:1rem}

/* TIMELINE */
.tl{padding:1rem}
.tl-title{font-family:'IBM Plex Mono',monospace;font-size:1rem;margin-bottom:.2rem}
.tl-desc{font-size:.78rem;color:var(--ts);margin-bottom:.8rem}
.phases{display:grid;grid-template-columns:repeat(7,1fr);gap:.3rem;margin-bottom:.8rem}
@media(max-width:500px){.phases{grid-template-columns:repeat(4,1fr)}}
.ph{padding:.4rem .2rem;background:var(--bgl);border:2px solid var(--bd);border-radius:6px;cursor:pointer;text-align:center;transition:border-color .15s}
.ph:hover,.ph.active{border-color:var(--s3)}
.ph-icon{font-size:1.1rem;display:block;margin-bottom:.1rem}
.ph-lbl{color:var(--ts);font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:.58rem;display:block;margin-bottom:.1rem}
.ph-name{color:var(--s3);font-weight:700;font-size:.6rem;display:block;margin-bottom:.1rem}
.ph-dur{color:var(--ts);font-size:.55rem;display:block}
.ph-content{background:var(--bgl);padding:.8rem;border-radius:8px;font-size:.82rem;line-height:1.55}
.ph-content h3{font-size:.85rem;margin-bottom:.4rem}

/* THEORY */
.prop{background:var(--bgl);padding:.8rem;border-radius:8px;margin-bottom:.8rem;border-left:3px solid var(--p1)}
.prop h3{color:var(--p1);font-family:'IBM Plex Mono',monospace;font-size:.8rem;margin-bottom:.5rem;line-height:1.4}
.prop>.intro-p{font-size:.78rem;color:var(--ts);margin-bottom:.5rem}
.dim{background:var(--bg);padding:.6rem;border-radius:6px;margin-bottom:.4rem}
.dim strong{color:var(--p2);display:block;font-size:.72rem;margin-bottom:.2rem}
.dim p{font-size:.78rem;color:var(--ts);line-height:1.5}
.anch{margin-top:.7rem;background:var(--bg);border-left:3px solid var(--p3);padding:.5rem .7rem;border-radius:0 6px 6px 0;font-size:.72rem;color:var(--ts);line-height:1.5}
.anch-lbl{font-size:.65rem;color:var(--p3);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.2rem}
.note-red{color:#ef4444;font-size:.78rem;line-height:1.5;margin-top:.5rem}
.note-it{font-style:italic;font-size:.78rem;color:var(--ts);line-height:1.5;margin-top:.5rem}
.diag-scroll{overflow-x:auto;background:#0d1117;border-radius:8px;border:1px solid var(--bd);margin-bottom:.8rem}
.diag-scroll svg{display:block}

/* SPHERES */
.stabs{display:flex;gap:.4rem;margin-bottom:.8rem;flex-wrap:wrap}
.stab{padding:.35rem .8rem;border-radius:20px;border:2px solid #444;background:transparent;color:var(--ts);font-family:'IBM Plex Mono',monospace;font-size:.72rem;font-weight:600;cursor:pointer}
.stab.s1{border-color:var(--s1);color:var(--s1)}.stab.s2{border-color:var(--s2);color:var(--s2)}.stab.s3{border-color:var(--s3);color:var(--s3)}
.stab.act{color:var(--tp)}.stab.s1.act{background:rgba(245,158,11,.18)}.stab.s2.act{background:rgba(139,92,246,.18)}.stab.s3.act{background:rgba(16,185,129,.18)}
.scard-sec{background:var(--bg);padding:.6rem .8rem;border-radius:6px;margin-bottom:.4rem;font-size:.78rem}
.scard-sec strong{display:block;font-size:.68rem;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.2rem}
.scard-sec p{color:var(--ts);line-height:1.5}
.rq-box{background:var(--bg);border-left:3px solid var(--p3);padding:.5rem .7rem;border-radius:0 6px 6px 0;font-size:.72rem;color:var(--ts);white-space:pre-line;margin-top:.5rem}

/* ── MOBILE: accordion tabs replace panels ── */
@media (max-width: 768px) {
  /* Header compact */
  .hdr { padding: .8rem; padding-right: 3.5rem; }
  .hdr h1 { font-size: .82rem; }
  .hdr h2 { font-size: .75rem; }
  .intro { font-size: .72rem; }
  .case-box { font-size: .72rem; }
  .btn { font-size: .7rem; padding: .45rem .7rem; }

  /* Panels become accordion blocks in flow */
  .inline-panel { border-radius: 0; border-left: none; border-right: none; border-top: 2px solid var(--p1); }
  .panel-hdr { padding: .7rem .8rem; }
  .panel-hdr h3 { font-size: .82rem; }
  .panel-body { padding: .8rem; }

  /* Timeline compact */
  .tl { padding: .8rem; }
  .tl-title { font-size: .85rem; }
  .phases { grid-template-columns: repeat(4, 1fr); gap: .25rem; }
  .ph { padding: .35rem .15rem; }
  .ph-icon { font-size: 1rem; }
  .ph-name { font-size: .55rem; }
  .ph-lbl { font-size: .5rem; }
  .ph-dur { font-size: .48rem; }
  .ph-content { font-size: .78rem; padding: .7rem; }
  .ph-content h3 { font-size: .8rem; }

  /* Theory props */
  .prop { padding: .7rem; }
  .prop h3 { font-size: .75rem; }
  .dim { padding: .5rem; }
  .dim strong { font-size: .68rem; }
  .dim p { font-size: .73rem; }

  /* Diagram scroll */
  .diag-scroll { -webkit-overflow-scrolling: touch; }

  /* Chat embedded */
  .chat-wrap { padding: .8rem; }
  .chat-msgs { max-height: 160px; }
  .chat-input { font-size: .78rem; padding: .45rem .6rem; }
  .chat-btn { font-size: .72rem; padding: .45rem .6rem; }

  /* Sphere tabs wrap */
  .stabs { gap: .3rem; }
  .stab { font-size: .65rem; padding: .3rem .6rem; }
}

.chat-msgs{max-height:200px;overflow-y:auto;margin-bottom:.6rem}
.chat-msg{margin-bottom:.5rem;padding:.5rem .7rem;border-radius:8px;font-size:.8rem;line-height:1.45}
.chat-msg.user{background:var(--s3);color:#fff;margin-left:20%}
.chat-msg.ai{background:var(--bgl);margin-right:20%}
.chat-row{display:flex;gap:.4rem}
.chat-input{flex:1;padding:.5rem .7rem;background:var(--bg);border:1px solid var(--bd);border-radius:6px;color:var(--tp);font-size:.8rem;font-family:inherit}
.chat-btn{background:var(--s3);color:#fff;border:none;padding:.5rem .8rem;border-radius:6px;cursor:pointer;font-size:.78rem;font-weight:700;white-space:nowrap}
</style>

function togglePanel(name) {
  var tp = document.getElementById('theoryPanel');
  var sp = document.getElementById('spheresPanel');
  var bt = document.getElementById('btnTheory');
  var bs = document.getElementById('btnSpheres');

  if (name === 'theory') {
    var opening = !tp.classList.contains('open');
    // close both first
    tp.classList.remove('open');
    sp.classList.remove('open');
    bt.textContent = UI[lang].btnTheory;
    bs.textContent = UI[lang].btnSpheres;
    if (opening) {
      tp.classList.add('open');
      bt.textContent = '✕ ' + UI[lang].btnTheory;
      document.getElementById('theoryBody').innerHTML = buildTheory();
    }
  } else {
    var opening = !sp.classList.contains('open');
    tp.classList.remove('open');
    sp.classList.remove('open');
    bt.textContent = UI[lang].btnTheory;
    bs.textContent = UI[lang].btnSpheres;
    if (opening) {
      sp.classList.add('open');
      bs.textContent = '✕ ' + UI[lang].btnSpheres;
      document.getElementById('spheresBody').innerHTML = buildSpheres();
    }
  }
}

  p.push('<text x="378" y="447" font-size="10" fill="#8b949e" font-family="sans-serif">'+lL3+'</text>');
  return p.join('');
}

function diagClick(id) {
  activeDiagBox = id;
  var svg = document.getElementById('rpc-svg');
  if (svg) svg.innerHTML = buildDiagram(lang==='fr', id);
  var map={b1:'td1',b2:'td2',b3:'td3'};
  var el = document.getElementById(map[id]);
  if (el) el.scrollIntoView({behavior:'smooth',block:'start'});
}

// ── THEORY BUILDER ────────────────────────────────────────────────────────────
function buildTheory() {
  var ui=UI[lang]; var fr=lang==='fr'; var props=THEORY[lang];
  var h='<div style="padding:.8rem;border-bottom:1px solid var(--bd);background:var(--bg)">';
  h+='<p style="font-size:.72rem;font-weight:700;color:var(--p3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.3rem">'+ui.diagTitle+'</p>';
  h+='<p style="font-size:.68rem;color:var(--ts);margin-bottom:.5rem;font-style:italic">👆 '+ui.diagHint+'</p>';
  h+='<div class="diag-scroll"><svg id="rpc-svg" viewBox="0 0 640 458" width="640" height="458">'+buildDiagram(fr,activeDiagBox)+'</svg></div></div>';
  props.forEach(function(p){
    h+='<div class="prop"><h3>'+p.title+'</h3><p class="intro-p">'+p.intro+'</p>';
    p.dims.forEach(function(d){h+='<div class="dim"><strong>'+d.icon+' '+d.label+'</strong><p>'+d.text+'</p></div>';});
    if(p.note)h+='<p class="'+(p.noteRed?'note-red':'note-it')+'">'+p.note+'</p>';
    if(p.anchor)h+='<div class="anch"><div class="anch-lbl">'+ui.anchorLabel+'</div>'+p.anchor+'</div>';
    h+='</div>';
  });
  return h;
}

// ── SPHERES BUILDER ───────────────────────────────────────────────────────────
function buildSpheres() {
  var ui=UI[lang];
  var h='<div class="stabs">';
  ['s1','s2','s3'].forEach(function(s){h+='<button class="stab '+s+(activeSphere===s?' act':'')+'" onclick="setSphere(\''+s+'\')">'+ui['tab_'+s]+'</button>';});
  h+='</div>';
  if(!activeSphere){h+='<p style="text-align:center;padding:1.5rem;color:var(--ts);font-size:.8rem">'+ui.sdefault+'</p>';}
  else{
    var d=SPHERES[lang][activeSphere];
    h+='<div style="border-left:4px solid '+d.color+';padding-left:.8rem;margin-bottom:.7rem"><h3 style="color:'+d.color+';font-size:.9rem">'+d.title+'</h3></div>';
    d.secs.forEach(function(s){h+='<div class="scard-sec"><strong style="color:'+d.color+'">'+s.l+'</strong><p>'+s.t+'</p></div>';});
    h+='<div class="rq-box"><div class="anch-lbl">🔬 '+ui.rqLabel+'</div>'+d.rq+'</div>';
  }
  return h;
}

function setSphere(s){
  activeSphere=s;
  document.getElementById('spheresBody').innerHTML=buildSpheres();
}

// ── TIMELINE ──────────────────────────────────────────────────────────────────
function buildTimeline(){
  var ps=PHASES[lang]; var ui=UI[lang];
  var h='';
  ps.forEach(function(p){
    h+='<div class="ph'+(p.num===phase?' active':'')+'" onclick="setPhase('+p.num+')">';
    h+='<span class="ph-icon">'+p.icon+'</span><span class="ph-lbl">'+p.label+'</span><span class="ph-name">'+p.name+'</span><span class="ph-dur">'+p.dur+'</span></div>';
  });
  document.getElementById('phases').innerHTML=h;
  var p=ps[phase-1];
  var c='<h3>'+p.title+'</h3><p style="color:var(--ts);font-size:.78rem;margin:.3rem 0 .6rem">'+p.desc+'</p>';
  c+='<div style="background:var(--bg);padding:.6rem;border-radius:6px;margin-bottom:.6rem;font-size:.78rem;line-height:1.5">'+p.ex+'</div>';
  c+='<strong style="font-size:.75rem">'+ui.propsLabel+'</strong><ul style="margin-left:1rem;margin-top:.3rem">';
  p.props.forEach(function(pr){c+='<li style="font-size:.76rem;margin-bottom:.3rem;color:var(--ts);line-height:1.4">'+pr+'</li>';});
  c+='</ul>';
  document.getElementById('phContent').innerHTML=c;
}

function setPhase(n){
  phase=n; buildTimeline();
  var el=document.getElementById('phContent');
  if(el) el.scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ── CHAT ──────────────────────────────────────────────────────────────────────
function addMsg(txt,type){
  var m=document.getElementById('chatMsgs');
  var d=document.createElement('div');d.className='chat-msg '+type;d.innerHTML=txt;
  m.appendChild(d);m.scrollTop=m.scrollHeight;
}
async function sendMsg(){
  var inp=document.getElementById('chatInput');
  var q=inp.value.trim();if(!q)return;
  addMsg(q,'user');inp.value='';addMsg('⏳...','ai loading');
  try{
    var p=PHASES[lang][phase-1];
    var ctx='Expert on S1/S2/S3 consulting value co-creation. Phase: '+p.name+'. '+p.desc+'. Answer in '+lang+'. Max 100 words.';
    var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,messages:[{role:'user',content:ctx+'\n\nQuestion: '+q}]})});
    var data=await res.json();
    var m=document.getElementById('chatMsgs');var l=m.querySelector('.loading');if(l)l.remove();
    addMsg(data.content&&data.content[0]?data.content[0].text:'Error','ai');
  }catch(e){var m=document.getElementById('chatMsgs');var l=m.querySelector('.loading');if(l)l.remove();addMsg('Error: '+e.message,'ai');}
}

// ── MAIN UPDATE ───────────────────────────────────────────────────────────────
function update(){
  var ui=UI[lang];
  document.getElementById('mainTitle').textContent=ui.mainTitle;
  document.getElementById('subtitle').textContent=ui.subtitle;
  document.getElementById('introText').textContent=ui.intro;
  document.getElementById('heroSignature').textContent=ui.heroSignature||'';
  document.getElementById('caseTitle').textContent=ui.caseTitle;
  document.getElementById('btnTheory').textContent=ui.btnTheory;
  document.getElementById('btnSpheres').textContent=ui.btnSpheres;
  document.getElementById('tlTitle').textContent=ui.tlTitle;
  document.getElementById('tlDesc').textContent=ui.tlDesc;
  document.getElementById('theoryPanelTitle').textContent=ui.theoryTitle;
  document.getElementById('spheresPanelTitle').textContent=ui.spheresTitle;
  document.getElementById('chatSendBtn').textContent=ui.sendBtn;
  document.getElementById('caseGrid').innerHTML=CASE[lang].map(function(c){return '<div class="case-item"><strong style="color:'+c.c+'">'+c.k+'</strong>'+c.v+'</div>';}).join('');
  if(document.getElementById('theoryPanel').classList.contains('open'))document.getElementById('theoryBody').innerHTML=buildTheory();
  if(document.getElementById('spheresPanel').classList.contains('open'))document.getElementById('spheresBody').innerHTML=buildSpheres();
  buildTimeline();
}

function toggleLang(){
  lang=lang==='fr'?'en':'fr';
  document.getElementById('langBtn').textContent=lang==='en'?'🇫🇷':'🇬🇧';
  update();
}

window.onload=function(){
  update();
  addMsg(lang==='fr'?"👋 Bonjour ! Je suis votre assistant IA sur le continuum S1/S2/S3.":"👋 Hello! I'm your AI assistant on the S1/S2/S3 continuum.",'ai');
};
</script>
