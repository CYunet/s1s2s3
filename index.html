<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark light">
  <title>Perceived Value Co-creation in AI-Era Consulting</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="hero">
    <div class="hero__shell">
      <div class="hero__topbar">
        <div class="hero__copy">
          <h1 class="hero__title" id="mainTitle"></h1>
          <p class="hero__subtitle" id="subtitle"></p>
        </div>
        <div class="toolbar">
          <button class="tool-btn tool-btn--lang" id="langBtn" type="button" aria-label="Toggle language"></button>
          <button class="tool-btn" id="themeBtn" type="button" aria-label="Toggle color theme"></button>
        </div>
      </div>
      <nav class="section-nav" id="sectionNav" aria-label="Primary sections"></nav>
    </div>
  </header>

  <main id="main" class="layout">
    <section class="content-section" id="why"></section>
    <section class="content-section" id="theory"></section>
    <section class="content-section" id="spheres"></section>
    <section class="content-section" id="illustration"></section>
  </main>

  <button class="floating-chat-btn" id="floatingChatBtn" type="button" aria-label="Open framework AI assistant">
    <span class="floating-chat-btn__icon" aria-hidden="true">
      <span class="floating-chat-btn__cap"></span>
      <span class="floating-chat-btn__head">
        <span class="floating-chat-btn__eye"></span>
        <span class="floating-chat-btn__eye"></span>
      </span>
    </span>
    <span class="floating-chat-btn__text">AI</span>
  </button>

  <footer class="page-footer">
    <p class="page-footer__signature" id="heroSignature"></p>
  </footer>

  <script src="./content.js"></script>
  <script src="./app.js"></script>
</body>
</html>
